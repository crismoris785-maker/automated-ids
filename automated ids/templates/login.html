<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoneyHiest | Tactical Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-deep: #0f172a;
            --accent: #38bdf8;
            --danger: #f43f5e;
            --glass: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background-color: var(--bg-deep);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(244, 63, 94, 0.05) 0%, transparent 50%);
            color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-icon {
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 1rem;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                filter: drop-shadow(0 0 0px var(--accent));
            }

            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 15px rgba(56, 189, 248, 0.4));
            }

            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 0px var(--accent));
            }
        }

        .form-control {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
            color: white;
        }

        .btn-primary {
            background: var(--accent);
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background: #0ea5e9;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.4);
        }

        .status-msg {
            font-size: 0.85rem;
            margin-top: 1rem;
            min-height: 20px;
            text-align: center;
        }

        .hacker-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--accent);
            overflow: hidden;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>

<body>
    <div class="hacker-bg" id="matrix"></div>

    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock brand-icon"></i>
            <h2 class="fw-bold mb-1">HoneyHiest</h2>
            <p class="text-secondary small text-uppercase ls-1">Tactical SOAR Dashboard</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">OPERATOR IDENTIFIER</label>
                <input type="text" id="username" class="form-control" placeholder="Admin Username" required
                    autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small fw-bold">SECURITY CLEARANCE KEY</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-unlock me-2"></i>AUTHORIZE ACCESS
            </button>
        </form>

        <div id="status" class="status-msg"></div>

        <div class="mt-4 pt-3 border-top border-secondary border-opacity-10 text-center">
            <p class="text-secondary x-small mb-0" style="font-size: 0.75rem;">
                <i class="bi bi-info-circle me-1"></i> Unauthorized access is strictly logged.
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            const btn = e.target.querySelector('button');

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>AUTHENTICATING...';
            status.innerHTML = '';
            status.className = 'status-msg';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    status.innerHTML = '<span class="text-success"><i class="bi bi-check-circle me-1"></i> Access granted. Redirecting...</span>';
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    status.innerHTML = `<span class="text-danger"><i class="bi bi-exclamation-triangle me-1"></i> ${data.message}</span>`;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-unlock me-2"></i>AUTHORIZE ACCESS';
                }
            } catch (err) {
                status.innerHTML = '<span class="text-danger">Connection error. Check backend.</span>';
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-unlock me-2"></i>AUTHORIZE ACCESS';
            }
        });

        // Simple Matrix background effect
        const matrix = document.getElementById('matrix');
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%&*";
        for (let i = 0; i < 50; i++) {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.left = Math.random() * 100 + '%';
            div.style.top = Math.random() * 100 + '%';
            div.style.animation = `pulse ${2 + Math.random() * 3}s infinite`;
            div.innerText = chars[Math.floor(Math.random() * chars.length)];
            matrix.appendChild(div);
        }
    </script>
</body>

</html>
