<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Threat Stream | HoneyHiest</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --accent: #38bdf8;
            --danger: #f43f5e;
            --success: #10b981;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 2px solid #1e293b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
            text-decoration: none;
        }

        #stream-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        .event-entry {
            display: flex;
            gap: 1.5rem;
            padding: 1rem;
            border-left: 3px solid #1e293b;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 1rem;
            border-radius: 0 8px 8px 0;
            animation: slideIn 0.3s ease-out;
            transition: all 0.2s ease;
        }

        .event-entry:hover {
            background: rgba(255, 255, 255, 0.05);
            border-left-color: var(--accent);
        }

        .event-entry.new {
            border-left-color: var(--accent);
            background: rgba(56, 189, 248, 0.05);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .timestamp {
            color: #64748b;
            font-size: 0.85rem;
            min-width: 100px;
        }

        .type {
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        .type-ssh_brute_force {
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .type-port_scan {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }

        .type-web_attack {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .type-file_integrity_violation {
            background: rgba(167, 139, 250, 0.1);
            color: #a78bfa;
            border: 1px solid #a78bfa;
        }

        .ip {
            color: var(--accent);
            font-weight: 500;
        }

        .details {
            color: #94a3b8;
            font-size: 0.9rem;
            flex-grow: 1;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 4px 12px;
            border-radius: 20px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }

        .btn-unblock-sm {
            padding: 2px 8px;
            font-size: 0.65rem;
            color: var(--accent);
            border: 1px solid var(--accent);
            background: rgba(56, 189, 248, 0.05);
            border-radius: 4px;
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-left: 10px;
        }

        .btn-unblock-sm:hover {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>

<body>
    <header>
        <a href="/" class="brand"><i class="bi bi-shield-lock-fill me-2"></i>HONEYHIEST <span
                style="font-size: 0.7em; opacity: 0.6;">// STREAM_LOG</span></a>

        <div class="ms-auto d-flex align-items-center gap-4 me-4">
            <a href="/security-lab" class="text-warning text-decoration-none small fw-bold"><i
                    class="bi bi-bug-fill me-1"></i> LAB</a>
            <a href="/" class="text-secondary text-decoration-none small fw-bold"><i
                    class="bi bi-speedometer2 me-1"></i> DASHBOARD</a>
            <a href="/analytics" class="text-secondary text-decoration-none small fw-bold"><i
                    class="bi bi-graph-up-arrow me-1"></i> ANALYTICS</a>
            <a href="/stream" class="text-accent text-decoration-none small fw-bold"><i
                    class="bi bi-broadcast me-1"></i> LOGS</a>
            <a href="/settings" class="text-secondary text-decoration-none small fw-bold"><i
                    class="bi bi-gear-fill me-1"></i> SETTINGS</a>
            <button onclick="logout()"
                class="btn btn-link text-danger text-decoration-none small fw-bold border-0 p-0 mb-0 ms-2"><i
                    class="bi bi-box-arrow-right"></i> LOGOUT</button>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div id="connection-status" class="small text-secondary">
                <i class="bi bi-circle-fill text-success me-1"></i> CONNECTED
            </div>
            <div class="text-secondary small">|</div>
            <div id="event-count" class="small fw-bold">0 EVENTS</div>
        </div>
    </header>

    <div id="stream-container">
        <!-- Events will appear here -->
    </div>

    <script>
        const socket = io();
        const container = document.getElementById('stream-container');
        const countBadge = document.getElementById('event-count');
        let totalEvents = 0;

        function addEvent(incident, isHistoric = false) {
            const entry = document.createElement('div');
            entry.className = `event-entry ${!isHistoric ? 'new' : ''}`;

            const d = new Date(incident.timestamp * 1000);
            const time = d.getFullYear() + '-' +
                (d.getMonth() + 1).toString().padStart(2, '0') + '-' +
                d.getDate().toString().padStart(2, '0') + ' ' +
                d.getHours().toString().padStart(2, '0') + ':' +
                d.getMinutes().toString().padStart(2, '0') + ':' +
                d.getSeconds().toString().padStart(2, '0');
            const typeClass = `type-${incident.type.toLowerCase()}`;

            let statusHtml = `<span class="status-pill"><i class="bi bi-shield-check"></i> ${incident.status}</span>`;

            if (incident.status === 'Resolved' && incident.source_ip !== 'Local System') {
                const remains = incident.expiry_time ? Math.max(0, Math.round((incident.expiry_time - Date.now() / 1000) / 60)) : 0;

                if (remains > 0) {
                    statusHtml = `<div class="d-flex align-items-center gap-2">
                        <span class="status-pill" style="background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid var(--danger);">
                            <i class="bi bi-hourglass-split"></i> JAILED (${remains}m)</span>
                        <button class="btn-unblock-sm" onclick="unblockIP('${incident.source_ip}', this)">UNBLOCK</button>
                    </div>`;
                } else {
                    statusHtml = `<div class="d-flex align-items-center gap-2">
                        <span class="status-pill" style="background: rgba(244, 63, 94, 0.1); color: var(--danger); border: 1px solid var(--danger);">
                            <i class="bi bi-shield-slash"></i> BLOCKED</span>
                        <button class="btn-unblock-sm" onclick="unblockIP('${incident.source_ip}', this)">UNBLOCK</button>
                    </div>`;
                }
            }

            entry.innerHTML = `
                <div class="timestamp">${time}</div>
                <div><span class="type ${typeClass}">${incident.type.replace('_', ' ')}</span></div>
                <div class="ip">${incident.source_ip}</div>
                <div class="details">${incident.details || 'Automated defensive action triggered.'}</div>
                <div>${statusHtml}</div>
            `;

            if (isHistoric) {
                container.appendChild(entry);
            } else {
                container.prepend(entry);
                totalEvents++;
                countBadge.innerText = `${totalEvents} EVENTS`;

                // Auto-cleanup if list gets massive
                if (container.children.length > 200) container.lastChild.remove();
            }
        }

        socket.on('new_incident', (incidents) => {
            const list = Array.isArray(incidents) ? incidents : [incidents];
            list.forEach(i => addEvent(i));
        });

        // Load history
        fetch('/api/incidents')
            .then(res => res.json())
            .then(data => {
                totalEvents = data.total || 0;
                countBadge.innerText = `${totalEvents} EVENTS`;
                // Show latest records in history
                if (data.incidents) {
                    data.incidents.slice(0, 50).forEach(i => addEvent(i, true));
                }
            });

        socket.on('connect', () => {
            document.getElementById('connection-status').innerHTML = '<i class="bi bi-circle-fill text-success me-1"></i> CONNECTED';
        });

        socket.on('disconnect', () => {
            document.getElementById('connection-status').innerHTML = '<i class="bi bi-circle-fill text-danger me-1"></i> DISCONNECTED';
        });

        async function unblockIP(ip, btn) {
            const reason = prompt(`Reason for unblocking ${ip}?`, "Confirmed non-malicious via log analysis");
            if (reason === null) return;

            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span>';
            btn.disabled = true;

            try {
                const response = await fetch('/api/unblock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ip: ip, reason: reason })
                });

                const result = await response.json();
                if (result.status === 'success') {
                    btn.closest('div').innerHTML = `<span class="status-pill"><i class="bi bi-shield-check"></i> Unblocked</span>`;
                } else {
                    alert('Error: ' + result.message);
                    btn.innerText = 'UNBLOCK';
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Connection failed');
                btn.innerText = 'UNBLOCK';
                btn.disabled = false;
            }
        }
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }
    </script>
</body>

</html>
